
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carcassonne Score Tracker</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    min-height:100vh;
    font-family:Georgia, serif;
    color:#f5e7c1;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:url("https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1600&auto=format&fit=crop");
    background-size:cover;
    background-position:center;
    opacity:0.30;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(rgba(25,18,8,.75),rgba(25,18,8,.75));
    z-index:-1;
}

.container{
    max-width:1100px;
    margin:0 auto;
    padding:12px;
    touch-action:manipulation;
}

.language-switcher{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:14px;
}

.language-switcher button{
    background:#ead7a4;
}

.language-switcher button.active{
    outline:3px solid #ffd98a;
    background:#8a5c25;
    color:#fff7df;
}

.title{
    text-align:center;
    font-size:30px;
    margin-bottom:16px;
}

.controls{
    display:flex;
    flex-direction:column;
    gap:10px;
    background:rgba(70,45,20,.85);
    border:2px solid #b08d57;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
}

input[type=number]{
    padding:8px;
    width:100%;
    font-size:18px;
}

.player-card{
    background:rgba(90,60,25,.85);
    border:2px solid #b08d57;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.player-name{
    width:100%;
    padding:8px;
    font-size:18px;
    margin-bottom:10px;
}

.score-buttons{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.score-button-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

.negative-score-button-row{
    margin-bottom:24px;
}

.score-button-negative{
    background:lightpink;
}

.score{
    font-size:42px;
    font-weight:bold;
    margin-top:10px;
}

.about{
    margin-top:20px;
    text-align:center;
    color:#ead7a4;
}

.about a{
    color:#ffd98a;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
}

@media (min-width: 700px){
    .container{
        margin:30px auto;
        padding:20px;
    }

    .title{
        font-size:42px;
        margin-bottom:20px;
    }

    .controls{
        flex-direction:row;
        align-items:center;
    }

    input[type=number]{
        width:90px;
    }

    .player-name{
        width:250px;
    }

}
</style>
</head>

<body>

<div class="container">

<div class="language-switcher" aria-label="Language">
    <button type="button" class="lang-button" data-lang="en">🇬🇧 English</button>
    <button type="button" class="lang-button" data-lang="uk">🇺🇦 Українська</button>
</div>

<div class="title" data-i18n="title">🏰 Carcassonne Score Tracker</div>

<div class="controls">
    <label for="playerCount" data-i18n="playersLabel">Players:</label>
    <input type="number" id="playerCount" min="1" max="8" value="2">

    <button type="button" onclick="generatePlayers()" data-i18n="createPlayers">Create Players</button>
    <button type="button" onclick="resetScores()" data-i18n="resetScores">Reset Scores</button>
</div>

<div id="players"></div>

<div class="about">
    <span data-i18n="by">by</span> Ruslan Makrenko -
    <a href="https://github.com/rmakrenko" target="_blank" rel="noopener noreferrer">github.com/rmakrenko</a>
</div>

</div>

<script>
const MIN_PLAYERS=1;
const MAX_PLAYERS=8;
const STORAGE_KEY='carcassonneData';
const LANGUAGE_KEY='carcassonneLanguage';
const translations={
    en:{
        htmlLang:'en',
        title:'🏰 Carcassonne Score Tracker',
        playersLabel:'Players:',
        createPlayers:'Create Players',
        resetScores:'Reset Scores',
        resetConfirm:'Reset all scores to 0?',
        playerName:'Player',
        by:'by'
    },
    uk:{
        htmlLang:'uk',
        title:'🏰 Трекер рахунку Carcassonne',
        playersLabel:'Гравці:',
        createPlayers:'Створити гравців',
        resetScores:'Скинути рахунок',
        resetConfirm:'Скинути всі рахунки до 0?',
        playerName:'Гравець',
        by:'від'
    }
};
let currentLanguage=loadLanguage();

function saveData(){
    const data=[];

    document.querySelectorAll('.player-card').forEach((card,index)=>{
        data.push({
            name:card.querySelector('.player-name').value.trim() || getDefaultPlayerName(index),
            score:normaliseScore(card.querySelector('.score').textContent)
        });
    });

    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function loadData(){
    try{
        const data=JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        return Array.isArray(data) ? data : [];
    }catch{
        localStorage.removeItem(STORAGE_KEY);
        return [];
    }
}

function loadLanguage(){
    const savedLanguage=localStorage.getItem(LANGUAGE_KEY);
    return translations[savedLanguage] ? savedLanguage : 'en';
}

function setLanguage(language){
    if(!translations[language]) return;
    currentLanguage=language;
    localStorage.setItem(LANGUAGE_KEY,language);
    applyTranslations();
    refreshPlayerPlaceholders();
    saveData();
}

function applyTranslations(){
    const dictionary=translations[currentLanguage];
    document.documentElement.lang=dictionary.htmlLang;
    document.title=dictionary.title.replace('🏰 ','');

    document.querySelectorAll('[data-i18n]').forEach(element=>{
        const key=element.dataset.i18n;
        element.textContent=dictionary[key] || translations.en[key] || key;
    });

    document.querySelectorAll('.lang-button').forEach(button=>{
        const isActive=button.dataset.lang===currentLanguage;
        button.classList.toggle('active',isActive);
        button.setAttribute('aria-pressed',String(isActive));
    });
}

function refreshPlayerPlaceholders(){
    document.querySelectorAll('.player-name').forEach((input,index)=>{
        input.placeholder=getDefaultPlayerName(index);
    });
}

function getDefaultPlayerName(index){
    return translations[currentLanguage].playerName+' '+(index+1);
}

function normaliseScore(value){
    const score=Number(value);
    return Number.isFinite(score) ? score : 0;
}

function normalisePlayerCount(value){
    const count=Math.floor(Number(value));
    if(!Number.isFinite(count)) return MIN_PLAYERS;
    return Math.min(MAX_PLAYERS,Math.max(MIN_PLAYERS,count));
}

function updateScore(id,delta){
    const el=document.getElementById('score-'+id);
    if(!el) return;
    el.textContent=normaliseScore(el.textContent)+delta;
    saveData();
}

function resetScores(){
    if(!confirm(translations[currentLanguage].resetConfirm)) return;

    document.querySelectorAll('.score').forEach(score=>{
        score.textContent=0;
    });

    saveData();
}

function generatePlayers(){

    const playerCountInput=document.getElementById('playerCount');
    const count=normalisePlayerCount(playerCountInput.value);
    playerCountInput.value=count;

    const saved=loadData();

    const container=document.getElementById('players');
    container.innerHTML='';

    for(let i=0;i<count;i++){

        const player=saved[i] || {
            name:getDefaultPlayerName(i),
            score:0
        };

        const card=document.createElement('div');
        card.className='player-card';

        const nameInput=document.createElement('input');
        nameInput.className='player-name';
        nameInput.value=String(player.name || getDefaultPlayerName(i));
        nameInput.placeholder=getDefaultPlayerName(i);
        nameInput.addEventListener('input',saveData);

        const buttons=document.createElement('div');
        buttons.className='score-buttons';
        buttons.appendChild(createScoreButtonRow(i,[-1,-3,-5],'negative-score-button-row'));
        buttons.appendChild(createScoreButtonRow(i,[1, 2, 3]));
        buttons.appendChild(createScoreButtonRow(i,[4, 5, 6]));
        buttons.appendChild(createScoreButtonRow(i,[7, 8, 9]));

        const score=document.createElement('div');
        score.className='score';
        score.id='score-'+i;
        score.textContent=normaliseScore(player.score);

        card.appendChild(nameInput);
        card.appendChild(buttons);
        card.appendChild(score);

        container.appendChild(card);
    }

    saveData();
}

function createScoreButtonRow(playerId,deltas,extraClass){
    const row=document.createElement('div');
    row.className='score-button-row';
    if(extraClass) row.classList.add(extraClass);
    deltas.forEach(delta=>row.appendChild(createScoreButton(playerId,delta)));
    return row;
}

function createScoreButton(playerId,delta){
    const button=document.createElement('button');
    button.type='button';
    if(delta < 0) button.className='score-button-negative';
    button.textContent=delta > 0 ? '+'+delta : String(delta);
    button.addEventListener('click',()=>updateScore(playerId,delta));
    return button;
}

document.querySelectorAll('.lang-button').forEach(button=>{
    button.addEventListener('click',()=>setLanguage(button.dataset.lang));
});

applyTranslations();
generatePlayers();

</script>

</body>
</html>
